version: 1
policies:
  # MT-01: Tenant isolation — users only see their org's rows (orders, customers, products, support_tickets)
  - name: tenant-isolation
    policy_type: row_filter
    description: Filter tables to the authenticated user's tenant
    is_enabled: true
    targets:
      - schemas: [public]
        tables: [orders, customers, products, support_tickets]
    definition:
      filter_expression: "org = {user.tenant}"

  # Note: `payments` and `order_items` don't carry an `org` column — they
  # reference `orders` via `order_id`. The proxy's filter expression parser
  # rejects subqueries in filter expressions, so we can't write
  # `order_id IN (SELECT id FROM orders WHERE ...)`. In `policy_required`
  # mode, tables without a matching policy return zero rows by default,
  # which is the correct safe behavior here. The docs guides only query
  # customers/orders/products/support_tickets, so this gap doesn't show.

  # DS-01: Partial SSN masking for support staff
  - name: mask-ssn-partial
    policy_type: column_mask
    description: Show only last 4 digits of SSN
    is_enabled: true
    targets:
      - schemas: [public]
        tables: [customers]
        columns: [ssn]
    definition:
      mask_expression: "'***-**-' || RIGHT(ssn, 4)"

  # DS-04: Full SSN redaction for untrusted users
  - name: mask-ssn-full
    policy_type: column_mask
    description: Fully redact SSN for users without clearance
    is_enabled: true
    targets:
      - schemas: [public]
        tables: [customers]
        columns: [ssn]
    definition:
      mask_expression: "'[RESTRICTED]'"

  # DS-10: Remove credit card column entirely
  - name: hide-credit-card
    policy_type: column_deny
    description: Remove credit_card column from all queries
    is_enabled: true
    targets:
      - schemas: [public]
        tables: [customers]
        columns: [credit_card]

  # DS-02: Hide cost_price and margin from non-finance users
  - name: hide-product-financials
    policy_type: column_deny
    description: Remove cost_price and margin from product queries
    is_enabled: true
    targets:
      - schemas: [public]
        tables: [products]
        columns: [cost_price, margin]

  # MT-05: Admin full access (assign to admin users)
  - name: admin-full-access
    policy_type: column_allow
    description: Full unrestricted access for admin users (assign per user)
    is_enabled: true
    targets:
      - schemas: ["*"]
        tables: ["*"]
        columns: ["*"]
